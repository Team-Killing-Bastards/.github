name: Bug report
description: Report reproducible incorrect behaviour
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Provide enough evidence for the problem to be reproduced. Remove account details, tokens, cookies and personal information.

  - type: input
    id: version
    attributes:
      label: Project version
      description: Exact release, pre-release or commit version.
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: MissionChief domain
      options:
        - www.missionchief.co.uk
        - police.missionchief.co.uk
        - Not applicable
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 150, Firefox 142, Safari 19
    validations:
      required: true

  - type: input
    id: manager
    attributes:
      label: Userscript manager
      placeholder: Tampermonkey, Violentmonkey, Greasemonkey or Userscripts
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Numbered steps from a known starting state.
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: other_scripts
    attributes:
      label: Other active userscripts or extensions
      description: List anything that may interact with the same page.

  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots or additional evidence
      description: Remove private information before submitting.

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed credentials, cookies, tokens and personal information.
          required: true
        - label: I can reproduce this using the information provided above.
          required: true
