  <rect x="128" y="795" width="126" height="24" rx="12" fill="#22d3a6" fill-opacity="0.12"/>
  <text x="149" y="812" fill="#79f0d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="850">PROJECT LEAD</text>
