    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" rx="34" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="34" fill="url(#grid)"/>
  <rect x="1" y="1" width="1598" height="998" rx="33" fill="none" stroke="#ffffff" stroke-opacity="0.11"/>

  <circle cx="120" cy="920" r="190" fill="#22d3a6" opacity="0.07" filter="url(#glow)"/>
