  <rect x="1148" y="604" width="112" height="24" rx="12" fill="#ffffff" fill-opacity="0.07"/>
  <text x="1170" y="621" fill="#d7deea" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="850">RELEASED</text>

