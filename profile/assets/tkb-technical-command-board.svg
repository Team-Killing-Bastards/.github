  <text x="899" y="812" fill="#bbb4ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="850">PROJECT OWNER</text>
  <rect x="1020" y="795" width="110" height="24" rx="12" fill="#34e4d2" fill-opacity="0.10"/>
