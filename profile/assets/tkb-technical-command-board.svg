<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Team Killing Bastards Technical Command Board</title>
  <desc id="desc">A two-domain technical portfolio board. Conroy1988 owns TKB Discord Bot and Investor Matrix. MartyBlyth owns MissionChief Command Nexus and Blyth Control Centre.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050914"/>
      <stop offset="0.50" stop-color="#0c1422"/>
      <stop offset="1" stop-color="#171024"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34e4d2"/>
      <stop offset="0.48" stop-color="#7b6cf6"/>
      <stop offset="1" stop-color="#e25bf2"/>
    </linearGradient>
    <linearGradient id="conroy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e25bf2" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#7b6cf6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22d3a6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="marty" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e4d2" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#4ca8ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7b6cf6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="cmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e25bf2"/>
      <stop offset="1" stop-color="#22d3a6"/>
    </linearGradient>
    <linearGradient id="mmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e4d2"/>
      <stop offset="1" stop-color="#7b6cf6"/>
    </linearGradient>
    <linearGradient id="cardDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.085"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.025"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#d5efff" stroke-opacity="0.028"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
