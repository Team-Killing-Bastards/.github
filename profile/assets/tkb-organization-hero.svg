<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" role="img" aria-labelledby="title desc">
  <title id="title">Team Killing Bastards — organisation and member technical portfolio</title>
  <desc id="desc">A dark technical banner for the Scottish-run Team Killing Bastards community showing four organisation systems and the wider Conroy1988 and MartyBlyth project portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a12"/>
      <stop offset="0.48" stop-color="#0d1626"/>
      <stop offset="1" stop-color="#1a1028"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#45e0ef"/>
      <stop offset="0.48" stop-color="#7b6cf6"/>
      <stop offset="1" stop-color="#d866ef"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.025"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#c4edff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1600" height="600" rx="32" fill="url(#bg)"/>
  <rect width="1600" height="600" rx="32" fill="url(#grid)"/>
  <rect x="1" y="1" width="1598" height="598" rx="31" fill="none" stroke="#ffffff" stroke-opacity="0.11"/>

  <circle cx="1290" cy="90" r="210" fill="#675cf0" opacity="0.14" filter="url(#glow)"/>
  <circle cx="1510" cy="520" r="220" fill="#d866ef" opacity="0.10" filter="url(#glow)"/>
  <circle cx="110" cy="560" r="160" fill="#45e0ef" opacity="0.08" filter="url(#glow)"/>

  <g opacity="0.055" stroke="#d9f7ff" stroke-width="34">
    <path d="M1030 30l520 520"/>
    <path d="M1550 30l-520 520"/>
  </g>

  <g transform="translate(76 72)">
    <rect width="88" height="88" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.14"/>
    <path d="M21 24h46v10H50v31H38V34H21z" fill="url(#accent)"/>
    <path d="M21 56h46v10H21z" fill="#ffffff" opacity="0.94"/>
  </g>

  <text x="188" y="105" fill="#97a6ba" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="750" letter-spacing="4">SCOTTISH-RUN GAMING COMMUNITY</text>
  <text x="74" y="218" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="74" font-weight="850" textLength="810" lengthAdjust="spacingAndGlyphs">TEAM KILLING BASTARDS</text>
  <rect x="76" y="244" width="770" height="6" rx="3" fill="url(#accent)"/>
  <text x="76" y="302" fill="#d3dae5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="600">Community leadership backed by a complete technical portfolio.</text>
  <text x="76" y="345" fill="#95a4b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Community systems · Personal products · Research · Games · Secure infrastructure</text>

  <g transform="translate(76 401)">
    <rect width="186" height="50" rx="25" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="26" cy="25" r="5.5" fill="#45e0ef"/>
    <text x="46" y="31" fill="#eef4fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" letter-spacing="1.3">COMMUNITY</text>

    <rect x="202" width="180" height="50" rx="25" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="228" cy="25" r="5.5" fill="#7b6cf6"/>
    <text x="248" y="31" fill="#eef4fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" letter-spacing="1.3">OPERATE</text>

    <rect x="398" width="178" height="50" rx="25" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="424" cy="25" r="5.5" fill="#d866ef"/>
    <text x="444" y="31" fill="#eef4fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" letter-spacing="1.3">BUILD</text>
